services:
#  app:
#    container_name: app
#    build:
#      context: .
#    depends_on:
#      - db

  db:
    image: postgres:17.4-alpine
    container_name: helpdesk_db
    restart: always

    env_file:
      - .env

    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - ./postgres-volume:/var/lib/postgresql/data
    networks:
      db-backend:
        aliases:
        - db.db-backend

volumes:
  postgres-volume:

networks:
  db-backend: